skills:
  - id: spigot-paper-api-caller
    version: "1.0.0"
    status: active
    category: integration
    description: 為 Minecraft Bukkit/Spigot/Paper 插件產生正確的 Java API 調用代碼，包含事件、指令、排程、NBT、Adventure API 等
    skill_file: spigot-paper-api-caller/SKILL.md
    reference_files:
